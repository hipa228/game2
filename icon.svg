<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient - deep dark blue-black -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0a1a"/>
      <stop offset="100%" stop-color="#050205"/>
    </radialGradient>

    <!-- Glow from beyond the door -->
    <radialGradient id="doorGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ff6633" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#cc3300" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Warm light seeping through -->
    <linearGradient id="lightSeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8844" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#ff4400" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <!-- Floor reflection gradient -->
    <linearGradient id="floorReflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6633" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <!-- Doorframe gradient -->
    <linearGradient id="doorFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a1a"/>
      <stop offset="50%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0d0505"/>
    </linearGradient>

    <!-- Edge light on doorframe -->
    <linearGradient id="edgeLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6633" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#ff6633" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#ff8844" stop-opacity="0.05"/>
      <stop offset="0.85" stop-color="#ff6633" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff6633" stop-opacity="0"/>
    </linearGradient>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="40%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.8"/>
    </radialGradient>

    <!-- Fog -->
    <filter id="fogBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <!-- Soft glow filter -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGlow)"/>

  <!-- Background glow from door -->
  <ellipse cx="256" cy="240" rx="160" ry="180" fill="url(#doorGlow)" filter="url(#bigGlow)"/>

  <!-- Floor -->
  <rect x="80" y="380" width="352" height="132" fill="#080408" opacity="0.5"/>

  <!-- Floor light reflection -->
  <rect x="180" y="380" width="152" height="80" fill="url(#floorReflect)" filter="url(#fogBlur)"/>

  <!-- Doorframe shadow on wall -->
  <rect x="156" y="100" width="200" height="280" rx="3" fill="#0a050a" opacity="0.6"/>

  <!-- Door frame outer -->
  <rect x="158" y="100" width="196" height="340" rx="3" fill="url(#doorFrame)" stroke="#331111" stroke-width="2"/>

  <!-- Inner doorway (the threshold) - pure darkness with warm glow -->
  <rect x="180" y="120" width="152" height="320" fill="#020002"/>

  <!-- Glow from beyond the doorway -->
  <rect x="180" y="120" width="152" height="320" fill="url(#lightSeep)"/>
  <ellipse cx="256" cy="200" rx="50" ry="60" fill="#ff6633" opacity="0.06" filter="url(#bigGlow)"/>

  <!-- Light rays emanating from threshold -->
  <polygon points="200,440 190,512 322,512 312,440" fill="#ff6633" opacity="0.04" filter="url(#fogBlur)"/>

  <!-- Floor line / bottom of door frame -->
  <line x1="158" y1="440" x2="354" y2="440" stroke="#1a0808" stroke-width="2"/>

  <!-- Edge lighting on door frame - left -->
  <rect x="176" y="115" width="4" height="325" fill="#ff6633" opacity="0.08" filter="url(#softGlow)"/>

  <!-- Edge lighting on door frame - right -->
  <rect x="332" y="115" width="4" height="325" fill="#ff6633" opacity="0.08" filter="url(#softGlow)"/>

  <!-- Edge lighting on door frame - top -->
  <rect x="180" y="116" width="152" height="3" fill="#ff6633" opacity="0.1" filter="url(#softGlow)"/>

  <!-- Subtle top glow -->
  <ellipse cx="256" cy="120" rx="80" ry="15" fill="#ff8844" opacity="0.06" filter="url(#fogBlur)"/>

  <!-- Fog at bottom of doorway -->
  <ellipse cx="256" cy="420" rx="80" ry="30" fill="#441111" opacity="0.08" filter="url(#fogBlur)"/>

  <!-- Cracks of light at door edges -->
  <rect x="178" y="120" width="2" height="320" fill="#ff8844" opacity="0.12"/>
  <rect x="332" y="120" width="2" height="320" fill="#ff8844" opacity="0.12"/>
  <rect x="180" y="118" width="152" height="2" fill="#ff8844" opacity="0.12"/>

  <!-- Atmospheric particles / dust in light -->
  <circle cx="230" cy="180" r="1.5" fill="#ffaa66" opacity="0.2"/>
  <circle cx="270" cy="210" r="1" fill="#ffaa66" opacity="0.15"/>
  <circle cx="245" cy="250" r="1.2" fill="#ff8844" opacity="0.12"/>
  <circle cx="280" cy="170" r="0.8" fill="#ffaa66" opacity="0.1"/>
  <circle cx="220" cy="300" r="1" fill="#ff8844" opacity="0.08"/>
  <circle cx="260" cy="280" r="1.3" fill="#ff6633" opacity="0.1"/>

  <!-- Subtle vignette overlay -->
  <rect width="512" height="512" fill="url(#vignette)"/>
</svg>
