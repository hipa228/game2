plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.horrorgame3d'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.horrorgame3d"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            java.srcDirs = ['src']
            res.srcDirs = ['res']
            assets.srcDirs = ['assets']
        }
    }
}
